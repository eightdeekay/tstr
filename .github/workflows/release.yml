name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tstr
          target: ${{ matrix.target }}
          # Archive named e.g. tstr-x86_64-unknown-linux-gnu.tar.gz
          archive: $bin-$target
          token: ${{ secrets.GITHUB_TOKEN }}
